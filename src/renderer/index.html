<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GoodCopy</title>
    <script>
      const initialWindowSize = new URLSearchParams(location.search).get('windowSize') || 'medium';
      document.documentElement.classList.add(`size-${initialWindowSize}`);
    </script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="search-field">
          <input id="searchInput" class="search-input" type="search" placeholder="Type to filter entries..." />
          <div id="tagSuggestions" class="tag-suggestions" hidden></div>
        </div>
        <select id="typeFilter" class="type-filter" aria-label="类型过滤">
          <option value="all">All</option>
          <option value="text">Text</option>
          <option value="image">Image</option>
          <option value="tagged">Tagged</option>
          <option value="untagged">Untagged</option>
        </select>
      </header>

      <section class="content">
        <aside class="entry-pane">
          <div class="date-label">Today</div>
          <ul id="entryList" class="entry-list"></ul>
          <div id="entryLoadStatus" class="entry-load-status" aria-live="polite"></div>
        </aside>

        <div
          id="paneResizeHandle"
          class="pane-resize-handle"
          role="separator"
          aria-label="调整列表和预览区域宽度"
          aria-orientation="vertical"
          tabindex="0"
        ></div>

        <section class="detail-pane">
          <div class="preview-stage">
            <textarea
              id="previewEditor"
              class="preview-editor"
              wrap="off"
              spellcheck="false"
              placeholder="复制文本或图片后会出现在这里"
            ></textarea>
            <div id="imagePreview" class="image-preview" hidden>
              <img id="previewImage" alt="剪贴板图片预览" />
            </div>
          </div>

          <div class="tags-row">
            <div id="tagList" class="tag-list"></div>
          </div>

          <div class="tool-row">
            <button id="pinButton" class="tool-button pin-button" type="button">Pin</button>
            <button id="transformButton" class="tool-button text-only-control" type="button">变换</button>
            <div class="metadata-field">
              <div id="metadataTagSuggestions" class="tag-suggestions metadata-tag-suggestions" hidden></div>
              <input id="tagInput" class="tag-input" type="text" placeholder="添加 tag" />
            </div>
            <input id="noteInput" class="note-input" type="text" placeholder="请输入标题" />
          </div>
        </section>
      </section>

      <footer class="footerbar">
        <div class="footer-meta">
          <span>Clipboard History</span>
          <span id="storageUsage" class="storage-usage">--</span>
        </div>
        <div class="footer-actions">
          <div class="footer-shortcut-hint">
            <span>Shift Enter</span>
            <span>Pin to desktop</span>
          </div>
          <div class="footer-shortcut-hint">
            <span>Enter</span>
            <span>Paste</span>
          </div>
          <button id="deleteButton" class="footer-button danger" type="button">Delete</button>
          <button id="settingsButton" class="footer-button" type="button">设置</button>
          <button id="aiSettingsButton" class="footer-button" type="button">AI</button>
        </div>
      </footer>
    </main>

    <div id="entryContextMenu" class="entry-context-menu" role="menu" hidden>
      <button id="contextPinButton" type="button" role="menuitem">Pin</button>
      <button id="contextTagButton" type="button" role="menuitem">显示相同 tag</button>
      <button id="contextDeleteButton" class="danger-action" type="button" role="menuitem">删除</button>
    </div>

    <div id="transformMenu" class="entry-context-menu transform-menu" role="menu" hidden>
      <button id="transformOneLineButton" type="button" role="menuitem">变为一行</button>
      <button id="transformRemoveBlankLinesButton" type="button" role="menuitem">去除所有空行</button>
      <button id="transformTrimLeadingSpacesButton" type="button" role="menuitem">去除首行前空格</button>
    </div>

    <div id="settingsModal" class="modal-backdrop" hidden>
      <section class="settings-modal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
        <header class="settings-header">
          <h2 id="settingsTitle">设置</h2>
          <button id="settingsCloseButton" class="icon-button" type="button" title="关闭">×</button>
        </header>

        <div id="generalSettingsBody" class="settings-body">
          <label class="settings-check">
            <input id="darkModeToggle" type="checkbox" />
            <span>暗黑模式</span>
          </label>
          <label class="settings-check">
            <input id="fetchGithubPullRequestTitlesToggle" type="checkbox" />
            <span>自动获取 GitHub PR 标题</span>
          </label>
          <label class="settings-field">
            <span>GitHub 登录</span>
            <button id="githubLoginButton" class="shortcut-record" type="button">检查状态</button>
          </label>
          <div id="githubStatus" class="settings-note">
            使用本机 GitHub CLI（gh），只读取严格匹配的 PR 链接。
          </div>
          <label class="settings-field">
            <span>呼出快捷键</span>
            <button id="shortcutRecordButton" class="shortcut-record" type="button">Ctrl P</button>
          </label>

          <label class="settings-field">
            <span>窗口大小</span>
            <select id="windowSizeSelect" class="compact-select">
              <option value="small">小</option>
              <option value="medium">中</option>
              <option value="large">大</option>
            </select>
          </label>

          <label class="settings-field">
            <span>行转换分隔符</span>
            <button id="lineSeparatorButton" class="shortcut-record separator-record" type="button">Space</button>
          </label>

          <label class="settings-field">
            <span>辅助功能权限</span>
            <button id="accessibilityButton" class="shortcut-record" type="button">检查权限</button>
          </label>
          <div id="accessibilityStatus" class="settings-note">用于自动粘贴到当前应用。</div>

          <label class="settings-field">
            <span>清理历史</span>
            <button id="clearUntaggedButton" class="shortcut-record danger-action" type="button">清除 Untagged</button>
          </label>
          <div id="clearUntaggedStatus" class="settings-note">只删除没有 tag 的历史记录，已打 tag 的记录会保留。</div>
        </div>

        <div id="aiSettingsBody" class="settings-body" hidden>
          <label class="settings-field">
            <span>AI 提供商</span>
            <select id="aiProviderSelect">
              <option value="none">不使用 AI</option>
              <option value="codex">Codex</option>
              <option value="claude">Claude</option>
            </select>
          </label>
          <label class="settings-field">
            <span>AI 登录</span>
            <button id="aiLoginButton" class="shortcut-record" type="button">检查状态</button>
          </label>
          <div id="aiStatus" class="settings-note">复用本机 CLI 登录，不会保存账号或 token。</div>
          <label class="settings-instruction">
            <textarea
              id="aiInstructionInput"
              rows="3"
              maxlength="1000"
              placeholder="想让 AI 做什么"
              disabled
            ></textarea>
            <button id="aiTestButton" class="shortcut-record ai-test-button" type="button" disabled>测试 AI</button>
          </label>
        </div>

        <footer class="settings-footer">
          <button id="quitAppButton" class="footer-button danger" type="button">退出应用</button>
          <button id="settingsSaveButton" class="footer-button strong" type="button">保存</button>
        </footer>
      </section>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
